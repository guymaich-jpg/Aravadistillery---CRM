<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aravadistillery CRM</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; form-action 'self'; base-uri 'self'; upgrade-insecure-requests">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <style>body{margin:0;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#efefec;color:#252525;text-align:center}.c{padding:2rem}p{color:#716a56;font-size:.875rem}</style>
  <script>
    // Clickjacking protection
    if (window !== window.top) { window.top.location = window.location; }
    // GitHub Pages SPA redirect — validate path is same-origin relative before storing.
    // Pages serves this single root 404.html for the whole site, so it must route
    // staging deep-links back to the staging app, never to the production root.
    var _p = location.pathname + location.search;
    var _base = _p.startsWith('/Aravadistillery---CRM/staging/')
      ? '/Aravadistillery---CRM/staging/'
      : '/Aravadistillery---CRM/';
    if (_p && _p.startsWith(_base)) {
      sessionStorage.setItem('redirect', _p);
    }
    location.replace(location.origin + _base);
  </script>
</head>
<body>
  <noscript>
    <div class="c">
      <h1>Aravadistillery CRM</h1>
      <p>יש להפעיל JavaScript בדפדפן כדי להשתמש במערכת.</p>
    </div>
  </noscript>
</body>
</html>
