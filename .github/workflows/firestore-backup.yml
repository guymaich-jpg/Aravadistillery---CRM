# Firestore backup — exports the shared production database (aravadistillery-crm)
# to a GCS bucket. Two triggers:
#
#   1. schedule        — daily at 02:00 UTC (05:00 Israel), lands in gs://<bucket>/scheduled/
#   2. workflow_dispatch — per-release export, lands in gs://<bucket>/releases/
#      Trigger from either app's release flow:
#        gh workflow run firestore-backup.yml -R guymaich-jpg/Aravadistillery---CRM \
#          -f app=crm -f version=6.3.0
#
# One-time setup required before this works — see docs/backups.md.
# Required repo secrets: GCP_BACKUP_SA_KEY, GCS_BACKUP_BUCKET

name: Firestore Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      app:
        description: 'App triggering the release export (crm / factory)'
        required: false
        default: 'manual'
        type: string
      version:
        description: 'Release version being backed up (e.g. 6.3.0)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: firestore-backup
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT_ID: aravadistillery-crm
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_BACKUP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Compute export path
        id: path
        run: |
          STAMP="$(date -u +%Y-%m-%d-%H%M)"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NAME="scheduled/${STAMP}"
          elif [ -n "${{ inputs.version }}" ]; then
            NAME="releases/${{ inputs.app }}-v${{ inputs.version }}-${STAMP}"
          else
            NAME="manual/${STAMP}"
          fi
          echo "uri=gs://${{ secrets.GCS_BACKUP_BUCKET }}/${NAME}" >> "$GITHUB_OUTPUT"
          echo "Export target: ${NAME}"

      - name: Export Firestore
        run: |
          gcloud firestore export "${{ steps.path.outputs.uri }}" \
            --project="${PROJECT_ID}"

      - name: Verify export exists
        run: |
          gcloud storage ls "${{ steps.path.outputs.uri }}/" | head -5
          echo "Backup complete: ${{ steps.path.outputs.uri }}"
